name: LeaselineRentRoll
options:
  bundleIdPrefix: com.shimondeitel.leaseline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  LeaselineRentRoll:
    type: application
    platform: iOS
    sources:
      - path: LeaselineRentRoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.leaseline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: LeaselineRentRoll/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LeaselineRentRollTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LeaselineRentRollTests
      - path: LeaselineRentRoll.storekit
    dependencies:
      - target: LeaselineRentRoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.leaseline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LeaselineRentRollUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LeaselineRentRollUITests
    dependencies:
      - target: LeaselineRentRoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.leaseline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  LeaselineRentRoll:
    build:
      targets:
        LeaselineRentRoll: all
        LeaselineRentRollTests: [test]
        LeaselineRentRollUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: LeaselineRentRoll.storekit
    test:
      config: Debug
      storeKitConfiguration: LeaselineRentRoll.storekit
      targets:
        - LeaselineRentRollTests
        - LeaselineRentRollUITests
    archive:
      config: Release
